<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canva Embed Overlay Timer - 4 Teams</title>
  <style>
    :root{
      --red:#9b0000;
      --blue:#2e348f;
      --yellow:#f4ce09;
      --ink: rgba(255,255,255,0.95);
      --shadow: 0 18px 60px rgba(0,0,0,0.55);
      --ringGlow: drop-shadow(0 0 12px rgba(244,206,9,0.24)) drop-shadow(0 0 24px rgba(244,206,9,0.18));
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; }
    body{
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--ink);
      background: transparent;
      overflow:hidden;
    }

    .stage{
      position:fixed;
      inset:0;
      display:flex;
      align-items:flex-start;
      justify-content:flex-end;
      padding: 14px;
      pointer-events:none;
    }

    .app{
      width: min(360px, calc(100vw - 28px));
      pointer-events:auto;
    }

    .panel{
      border-radius: 24px;
      border: 1px solid rgba(244,206,9,0.30);
      background: linear-gradient(180deg, rgba(46,52,143,0.78), rgba(46,52,143,0.55));
      box-shadow: 0 24px 80px rgba(0,0,0,0.55);
      position:relative;
      overflow:hidden;
      backdrop-filter: blur(10px);
    }
    .panel::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(900px 600px at 50% 10%, rgba(244,206,9,0.12), transparent 60%),
        radial-gradient(800px 600px at 20% 60%, rgba(244,206,9,0.08), transparent 65%);
      pointer-events:none;
    }
    .panel::after{
      content:"";
      position:absolute;
      inset:-40% -40% auto -40%;
      height: 55%;
      transform: rotate(-8deg);
      background: linear-gradient(180deg, rgba(255,255,255,0.18), transparent 70%);
      opacity: 0.55;
      pointer-events:none;
    }

    .toolbar{
      display:flex;
      justify-content:space-between;
      gap:8px;
      padding:10px 10px 0;
      position:relative;
      z-index:2;
    }

    .pill{
      border: 1px solid rgba(244,206,9,0.45);
      background: rgba(0,0,0,0.22);
      color: var(--ink);
      border-radius: 999px;
      padding: 8px 10px;
      font-weight: 900;
      font-size: 12px;
      letter-spacing: .2px;
      cursor:pointer;
      box-shadow: 0 10px 35px rgba(0,0,0,0.25);
      user-select:none;
    }

    .stageHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 10px 14px 8px;
      position:relative;
      z-index:1;
      gap:10px;
    }
    .stageTeam{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 1px;
      min-width:0;
      font-size:15px;
    }
    .bigLamp{
      width: 11px; height: 11px; border-radius: 999px;
      background: rgba(255,255,255,0.25);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.10);
      flex:0 0 auto;
    }
    .bigLamp.running{
      background: var(--yellow);
      box-shadow: 0 0 0 4px rgba(244,206,9,0.20), 0 0 22px rgba(244,206,9,0.45);
    }
    .bigLamp.done{
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.20), 0 0 22px rgba(255,255,255,0.30);
    }

    .teamTabs{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:6px;
      padding: 0 10px 8px;
      position:relative;
      z-index:1;
    }
    .teamTab{
      appearance:none;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.22);
      color: var(--ink);
      border-radius: 12px;
      padding: 9px 6px;
      font-weight: 950;
      font-size:12px;
      letter-spacing: .1px;
      cursor:pointer;
      min-width:0;
    }
    .teamTab.active{
      background: linear-gradient(135deg, rgba(244,206,9,1), rgba(244,206,9,0.70));
      color: rgba(0,0,0,0.85);
      border-color: rgba(244,206,9,0.75);
      box-shadow: 0 10px 25px rgba(0,0,0,0.22);
    }

    .stageBody{
      padding: 6px 12px 12px;
      position:relative;
      z-index:1;
    }

    .bigCircle{
      width: min(220px, 58vw);
      aspect-ratio: 1 / 1;
      margin: 4px auto 10px;
      position:relative;
    }
    .bigCircle svg{ transform: rotate(-90deg); width:100%; height:100%; }

    .bigCircle::before{
      content:"";
      position:absolute;
      inset:-12px;
      border-radius: 999px;
      background:
        repeating-conic-gradient(
          from 0deg,
          rgba(244,206,9,0.70) 0 5deg,
          rgba(155,0,0,0.50) 5deg 7deg,
          rgba(255,255,255,0.10) 7deg 13deg
        );
      opacity: 0.40;
      mask: radial-gradient(circle, transparent 58%, #000 59%);
      -webkit-mask: radial-gradient(circle, transparent 58%, #000 59%);
      animation: lightsSpin 6s linear infinite;
    }
    @keyframes lightsSpin{ to{ transform: rotate(360deg); } }

    .bigCircle::after{
      content:"";
      position:absolute;
      inset:-22px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(244,206,9,0.22), transparent 62%);
      opacity: 0.85;
      filter: blur(10px);
      pointer-events:none;
    }

    .ring-bg{
      fill:none;
      stroke: rgba(0,0,0,0.30);
      stroke-width: 12;
    }
    .ring{
      fill:none;
      stroke: var(--yellow);
      stroke-width: 12;
      stroke-linecap: round;
      filter: var(--ringGlow);
      transition: stroke-dashoffset 0.28s linear;
    }

    .bigTime{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-variant-numeric: tabular-nums;
      font-weight: 1100;
      font-size: clamp(42px, 7vw, 72px);
      color: var(--yellow);
      text-shadow: 0 3px 0 rgba(0,0,0,0.25), 0 0 30px rgba(244,206,9,0.18);
      letter-spacing: 1px;
    }
    .bigTime.done{ color: rgba(255,255,255,0.95); }

    .stageControls{
      display:flex;
      flex-direction:column;
      gap: 8px;
    }
    .stageControls .row{
      display:flex;
      gap: 8px;
    }
    .stageControls .row button{ flex:1; }

    button{
      appearance:none;
      border:none;
      border-radius: 14px;
      padding: 10px 12px;
      font-weight: 950;
      letter-spacing: .25px;
      cursor:pointer;
      user-select:none;
      transition: transform .08s ease, filter .15s ease, opacity .15s ease;
    }
    button:active{ transform: translateY(1px); }
    button:disabled{ opacity: .45; cursor:not-allowed; }

    .play{
      background: linear-gradient(135deg, rgba(244,206,9,1), rgba(244,206,9,0.70));
      color: rgba(0,0,0,0.85);
      box-shadow: 0 10px 25px rgba(0,0,0,0.22);
    }
    .pause{
      background: rgba(0,0,0,0.22);
      color: var(--ink);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .reset{
      width:100%;
      background: rgba(0,0,0,0.18);
      color: var(--ink);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .adders{
      display:grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    .adder{
      padding: 9px 0;
      background: rgba(244,206,9,0.92);
      color: rgba(0,0,0,0.85);
      border-radius: 12px;
      font-size: 11px;
      font-weight: 950;
    }

    .panic .ring{ stroke: rgba(255,255,255,0.95); filter: drop-shadow(0 0 16px rgba(255,255,255,0.25)); }
    .panic .bigTime{ color: rgba(255,255,255,0.95); }

    .pulse .ring{ animation: ringPulse .9s ease-in-out infinite; }
    @keyframes ringPulse{
      0%,100%{ filter: var(--ringGlow); }
      50%{ filter: drop-shadow(0 0 18px rgba(244,206,9,0.35)) drop-shadow(0 0 36px rgba(244,206,9,0.22)); }
    }

    .blink{ animation: blinkRed .45s ease-in-out infinite; }
    @keyframes blinkRed{
      0%,100%{ filter: none; }
      50%{ filter: drop-shadow(0 0 0 rgba(0,0,0,0)); }
    }

    .embedMode .toolbar{
      opacity:.35;
    }

    @media (max-width: 520px){
      .stage{ padding: 8px; }
      .app{ width: min(100%, 360px); }
      .bigCircle{ width:min(190px, 56vw); }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="app">
      <div class="panel">
        <div class="toolbar">
          <button class="pill" id="embedBtn">Canva embed</button>
          <button class="pill" id="fsBtn">⛶ Fullscreen</button>
        </div>

        <div class="stageHeader">
          <div class="stageTeam">
            <span class="bigLamp" id="stageLamp" aria-hidden="true"></span>
            <span id="stageTeamName">Team 1</span>
          </div>
        </div>

        <div class="teamTabs" id="teamTabs"></div>

        <div class="stageBody">
          <div class="bigCircle" id="bigCircle">
            <svg viewBox="0 0 160 160" aria-hidden="true">
              <circle class="ring-bg" cx="80" cy="80" r="60"></circle>
              <circle class="ring" id="stageRing" cx="80" cy="80" r="60"></circle>
            </svg>
            <div class="bigTime" id="stageTime">0</div>
          </div>

          <div class="stageControls">
            <div class="row">
              <button class="play" id="stagePlay">Play</button>
              <button class="pause" id="stagePause">Pauze</button>
            </div>
            <div class="adders">
              <button class="adder" data-sec="10">+10</button>
              <button class="adder" data-sec="20">+20</button>
              <button class="adder" data-sec="30">+30</button>
              <button class="adder" data-sec="40">+40</button>
              <button class="adder" data-sec="50">+50</button>
            </div>
            <button class="reset" id="stageReset">Reset</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  function playBeep(){
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = "square";
      o.frequency.value = 880;
      g.gain.value = 0.0001;
      o.connect(g); g.connect(ctx.destination);
      o.start();
      g.gain.exponentialRampToValueAtTime(0.22, ctx.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.35);
      o.stop(ctx.currentTime + 0.38);
    }catch(e){}
  }

  const fmt = (sec) => {
    sec = Math.max(0, Math.floor(sec));
    return String(sec);
  };

  class CountdownTimer {
    constructor(teamName){
      this.teamName = teamName;
      this.remaining = 0;
      this.running = false;
      this.done = false;
      this._max = 1;
      this._interval = null;
      this._lastTick = 0;
    }

    add(sec){
      this.remaining = Math.max(0, this.remaining + sec);
      this._max = Math.max(this._max, this.remaining);
      if (this.remaining > 0) this.done = false;
    }

    reset(){
      this.remaining = 0;
      this._max = 1;
      this.done = false;
      this.pause();
    }

    start(){
      if (this.running) return;
      if (this.remaining <= 0) return;
      this.running = true;
      this.done = false;
      this._lastTick = performance.now();
      this._interval = setInterval(() => this._tick(), 140);
    }

    pause(){
      if (!this.running) return;
      this.running = false;
      clearInterval(this._interval);
      this._interval = null;
    }

    toggle(){
      this.running ? this.pause() : this.start();
    }

    _tick(){
      if (!this.running) return;
      const now = performance.now();
      const delta = now - this._lastTick;
      const dec = Math.floor(delta / 1000);
      if (dec > 0){
        this.remaining -= dec;
        this._lastTick += dec * 1000;
        if (this.remaining <= 0){
          this.remaining = 0;
          this.done = true;
          this.pause();
          playBeep();
        }
      }
    }
  }

  const timers = [
    new CountdownTimer("Team 1"),
    new CountdownTimer("Team 2"),
    new CountdownTimer("Team 3"),
    new CountdownTimer("Team 4"),
  ];

  let activeIndex = 0;
  const root = document.body;
  const teamTabs = document.getElementById("teamTabs");
  const stageTeamName = document.getElementById("stageTeamName");
  const stageLamp = document.getElementById("stageLamp");
  const stageTime = document.getElementById("stageTime");
  const stageRing = document.getElementById("stageRing");
  const stagePlay = document.getElementById("stagePlay");
  const stagePause = document.getElementById("stagePause");
  const stageReset = document.getElementById("stageReset");
  const bigCircle = document.getElementById("bigCircle");
  const embedBtn = document.getElementById("embedBtn");
  const fsBtn = document.getElementById("fsBtn");

  const stageR = 60;
  const stageC = 2 * Math.PI * stageR;
  stageRing.style.strokeDasharray = String(stageC);
  stageRing.style.strokeDashoffset = String(stageC);

  function activeTimer(){
    return timers[activeIndex];
  }

  function buildTabs(){
    teamTabs.innerHTML = "";
    timers.forEach((t, i) => {
      const btn = document.createElement("button");
      btn.className = "teamTab";
      btn.textContent = t.teamName;
      btn.addEventListener("click", () => {
        activeIndex = i;
        renderTabs();
        renderStage();
      });
      teamTabs.appendChild(btn);
    });
    renderTabs();
  }

  function renderTabs(){
    [...teamTabs.children].forEach((btn, i) => {
      btn.classList.toggle("active", i === activeIndex);
    });
  }

  function renderStage(){
    const timer = activeTimer();
    stageTeamName.textContent = timer.teamName;
    stageTime.textContent = fmt(timer.remaining);
    stageTime.classList.toggle("done", timer.done);
    stageLamp.classList.toggle("running", timer.running);
    stageLamp.classList.toggle("done", timer.done);

    const ratio = (timer._max <= 0) ? 0 : (timer.remaining / timer._max);
    const clamped = Math.max(0, Math.min(1, ratio));
    const offset = stageC * (1 - clamped);
    stageRing.style.strokeDashoffset = String(offset);

    bigCircle.classList.toggle("panic", timer.remaining > 0 && timer.remaining <= 5 && !timer.done);
    bigCircle.classList.toggle("pulse", timer.remaining > 0 && timer.remaining <= 10 && !timer.done);
    bigCircle.classList.toggle("blink", timer.remaining > 0 && timer.remaining <= 5 && !timer.done);
    stagePlay.disabled = (timer.remaining <= 0);
  }

  stagePlay.addEventListener("click", () => {
    activeTimer().start();
    renderStage();
  });

  stagePause.addEventListener("click", () => {
    activeTimer().pause();
    renderStage();
  });

  stageReset.addEventListener("click", () => {
    activeTimer().reset();
    renderStage();
  });

  document.querySelectorAll(".stageControls .adder").forEach(btn => {
    btn.addEventListener("click", () => {
      activeTimer().add(Number(btn.dataset.sec));
      renderStage();
    });
  });

  embedBtn.addEventListener("click", () => {
    root.classList.toggle("embedMode");
  });

  fsBtn.addEventListener("click", async () => {
    try{
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen?.();
      } else {
        await document.exitFullscreen?.();
      }
    }catch(e){}
  });

  document.addEventListener("keydown", (e) => {
    if (e.code === "Space"){
      e.preventDefault();
      activeTimer().toggle();
      renderStage();
    } else if (e.key.toLowerCase() === "r"){
      activeTimer().reset();
      renderStage();
    } else if (e.key >= "1" && e.key <= "4"){
      activeIndex = Number(e.key) - 1;
      renderTabs();
      renderStage();
    } else if (e.key.toLowerCase() === "c"){
      root.classList.toggle("embedMode");
    }
  });

  (function raf(){
    renderStage();
    requestAnimationFrame(raf);
  })();

  buildTabs();
</script>
</body>
</html>
