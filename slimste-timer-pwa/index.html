<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>De Slimste Timer — Quizmodus</title>



<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#9b0000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Slimste Timer">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

<style>
  :root{
    --red:#9b0000;
    --blue:#2e348f;
    --yellow:#f4ce09;

    --ink: rgba(255,255,255,0.95);
    --muted: rgba(255,255,255,0.78);
    --shadow: 0 18px 60px rgba(0,0,0,0.55);
    --radius: 22px;

    --glass: rgba(46,52,143,0.86);
    --glass2: rgba(46,52,143,0.70);
    --border: rgba(244,206,9,0.26);

    --ringGlow: drop-shadow(0 0 12px rgba(244,206,9,0.24)) drop-shadow(0 0 24px rgba(244,206,9,0.18));
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }

  body{
    margin:0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    color: var(--ink);
    background-color: var(--red);

    /* JOUW BIJLAGE: zet hem naast deze HTML en noem 'background.png' */
    background-image: url("background.png");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    display:flex;
    align-items:center;
    justify-content:center;
    padding: 22px;
    overflow-x:hidden;
  }

  /* subtiele filmgrain + vignette */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(1200px 800px at 50% 15%, rgba(244,206,9,0.12), transparent 60%),
      radial-gradient(1400px 900px at 50% 110%, rgba(0,0,0,0.40), transparent 60%),
      linear-gradient(180deg, rgba(0,0,0,0.15), rgba(0,0,0,0.20));
    mix-blend-mode: multiply;
  }

  .app{
    width: min(1200px, 100%);
    position:relative;
    z-index:1;
  }

  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 16px;
    margin-bottom: 16px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap: 14px;
    min-width: 0;
  }

  .logo{
    width: 54px;
    height: 54px;
    border-radius: 16px;
    overflow:hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    border: 2px solid rgba(244,206,9,0.55);
    background: rgba(0,0,0,0.20);
    flex: 0 0 auto;
  }
  .logo img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .titlewrap{ min-width:0; }
  .title{
    margin:0;
    font-weight: 950;
    letter-spacing: 0.9px;
    font-size: 18px;
    text-transform: uppercase;
    text-shadow: 0 2px 0 rgba(0,0,0,0.25);
  }
  .subtitle{
    margin:2px 0 0 0;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.2px;
  }

  .actions{
    display:flex;
    gap: 10px;
    align-items:center;
  }

  .pill{
    border: 1px solid rgba(244,206,9,0.45);
    background: rgba(0,0,0,0.22);
    color: var(--ink);
    border-radius: 999px;
    padding: 10px 12px;
    font-weight: 900;
    letter-spacing: .3px;
    cursor:pointer;
    box-shadow: 0 10px 35px rgba(0,0,0,0.25);
    transition: transform .08s ease, filter .15s ease, background .15s ease;
    user-select:none;
  }
  .pill:hover{ filter: brightness(1.05); background: rgba(0,0,0,0.28); }
  .pill:active{ transform: translateY(1px); }

  .pillSmall{
    padding: 8px 10px;
    font-size: 12px;
  }

  /* ====== Finale mode (pick 2 teams) ====== */
  .finaleModeOn .card{ cursor: crosshair; }
  .card.finaleSelected{
    outline: 3px solid rgba(244,206,9,0.85);
    outline-offset: 3px;
  }


  .grid{
    display:grid;
    grid-template-columns: repeat(4, minmax(0,1fr));
    gap: 14px;
  }
  @media (max-width: 980px){ .grid{ grid-template-columns: repeat(2, minmax(0,1fr)); } }
  @media (max-width: 560px){ .grid{ grid-template-columns: 1fr; } }

  /* ==== TEAM CARD (gloss + neon) ==== */
  .card{
    border-radius: var(--radius);
    overflow:hidden;
    box-shadow: var(--shadow);
    position:relative;
    background: linear-gradient(180deg, var(--glass), var(--glass2));
    border: 1px solid var(--border);
    transform: translateZ(0);
    cursor: pointer;
    transition: transform .18s ease, filter .18s ease;
    backdrop-filter: blur(8px);
  }
  .card:hover{
    transform: translateY(-2px);
    filter: brightness(1.03);
  }

  /* quiz show header stripe */
  .card::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height: 10px;
    background: linear-gradient(90deg, rgba(244,206,9,0.95), rgba(244,206,9,0.25), rgba(244,206,9,0.95));
    opacity: 0.95;
  }

  /* glossy highlight */
  .card::after{
    content:"";
    position:absolute;
    inset:-40% -40% auto -40%;
    height: 60%;
    transform: rotate(-10deg);
    background: linear-gradient(180deg, rgba(255,255,255,0.18), transparent 70%);
    opacity: 0.55;
    pointer-events:none;
  }

  .inner{
    padding: 16px 14px 14px;
    position:relative;
  }

  .team{
    margin: 2px 0 12px;
    font-weight: 950;
    letter-spacing: 1.1px;
    text-transform: uppercase;
    font-size: 14px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 10px;
  }
  .team .tag{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding: 7px 10px;
    border-radius: 999px;
    border: 1px solid rgba(244,206,9,0.35);
    background: rgba(0,0,0,0.22);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.12);
  }

  .lamp{
    width: 9px; height: 9px; border-radius: 999px;
    background: rgba(255,255,255,0.25);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.10);
  }
  .lamp.running{
    background: var(--yellow);
    box-shadow: 0 0 0 3px rgba(244,206,9,0.20), 0 0 18px rgba(244,206,9,0.35);
  }
  .lamp.done{
    background: #ffffff;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.20), 0 0 18px rgba(255,255,255,0.25);
  }

  /* ====== RING + LIGHTS ====== */
  .circle{
    width: 150px;
    height: 150px;
    margin: 0 auto 14px;
    position:relative;
  }

  /* “lampjes” rondom (met repeating-conic-gradient) */
  .circle::before{
    content:"";
    position:absolute;
    inset:-10px;
    border-radius: 999px;
    background:
      repeating-conic-gradient(
        from 0deg,
        rgba(244,206,9,0.60) 0 6deg,
        rgba(155,0,0,0.45) 6deg 8deg,
        rgba(255,255,255,0.08) 8deg 14deg
      );
    filter: blur(0.6px);
    opacity: 0.35;
    mask: radial-gradient(circle, transparent 55%, #000 56%);
    -webkit-mask: radial-gradient(circle, transparent 55%, #000 56%);
    transition: opacity .2s ease;
  }

  /* extra glow layer */
  .circle::after{
    content:"";
    position:absolute;
    inset:-18px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(244,206,9,0.18), transparent 60%);
    opacity: 0.70;
    filter: blur(8px);
    pointer-events:none;
  }

  svg{ width:100%; height:100%; transform: rotate(-90deg); }

  .ring-bg{
    fill:none;
    stroke: rgba(0,0,0,0.30);
    stroke-width: 12;
  }
  .ring{
    fill:none;
    stroke: var(--yellow);
    stroke-width: 12;
    stroke-linecap: round;
    filter: var(--ringGlow);
    transition: stroke-dashoffset 0.28s linear;
  }

  .time{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-variant-numeric: tabular-nums;
    font-weight: 1000;
    font-size: 34px;
    color: var(--yellow);
    text-shadow: 0 2px 0 rgba(0,0,0,0.25);
    letter-spacing: 1px;
  }
  .time.done{
    color: rgba(255,255,255,0.95);
  }

  .controls{
    display:flex;
    gap: 10px;
    margin-bottom: 12px;
  }

  button{
    appearance:none;
    border:none;
    border-radius: 14px;
    padding: 10px 12px;
    font-weight: 950;
    letter-spacing: .25px;
    cursor:pointer;
    user-select:none;
    transition: transform .08s ease, filter .15s ease, opacity .15s ease;
  }
  button:active{ transform: translateY(1px); }
  button:disabled{ opacity: .45; cursor:not-allowed; }

  .play{
    flex:1;
    background: linear-gradient(135deg, rgba(244,206,9,1), rgba(244,206,9,0.70));
    color: rgba(0,0,0,0.85);
    box-shadow: 0 10px 25px rgba(0,0,0,0.22);
  }
  .pause{
    flex:1;
    background: rgba(0,0,0,0.22);
    color: var(--ink);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .reset{
    width:100%;
    margin-top: 10px;
    background: rgba(0,0,0,0.18);
    color: var(--ink);
    border: 1px solid rgba(255,255,255,0.12);
  }

  .adders{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .adder{
    padding: 9px 0;
    background: rgba(244,206,9,0.92);
    color: rgba(0,0,0,0.85);
    border-radius: 12px;
    font-size: 12px;
    font-weight: 950;
  }

  .footer{
    margin-top: 10px;
    display:flex;
    justify-content:space-between;
    gap: 10px;
    color: rgba(255,255,255,0.82);
    font-size: 12px;
  }

  .kbd{
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
    background: rgba(0,0,0,0.22);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 2px 6px;
    border-radius: 8px;
  }

  /* ====== QUIZ MODE OVERLAY ====== */
  .overlay{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    padding: 26px;
    z-index: 50;
    background: radial-gradient(900px 600px at 50% 30%, rgba(0,0,0,0.35), rgba(0,0,0,0.72));
    backdrop-filter: blur(10px);
  }
  .overlay.show{ display:flex; }

  .stage{
    width:min(980px, 100%);
    border-radius: 28px;
    border: 1px solid rgba(244,206,9,0.30);
    background: linear-gradient(180deg, rgba(46,52,143,0.78), rgba(46,52,143,0.55));
    box-shadow: 0 30px 100px rgba(0,0,0,0.60);
    position:relative;
    overflow:hidden;
    transform: translateY(6px) scale(0.98);
    opacity: 0;
    animation: popIn .22s ease forwards;
  }
  @keyframes popIn{
    to{ transform: translateY(0) scale(1); opacity: 1; }
  }

  .stage::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      radial-gradient(900px 600px at 50% 10%, rgba(244,206,9,0.12), transparent 60%),
      radial-gradient(800px 600px at 20% 60%, rgba(244,206,9,0.08), transparent 65%);
    pointer-events:none;
  }
  .stage::after{
    content:"";
    position:absolute;
    inset:-40% -40% auto -40%;
    height: 55%;
    transform: rotate(-8deg);
    background: linear-gradient(180deg, rgba(255,255,255,0.18), transparent 70%);
    opacity: 0.55;
    pointer-events:none;
  }

  .stageHeader{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 16px 16px 10px;
    position:relative;
    z-index:1;
  }
  .stageTeam{
    display:flex;
    align-items:center;
    gap:12px;
    font-weight: 1000;
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }
  .stageTeam .bigLamp{
    width: 12px; height: 12px; border-radius: 999px;
    background: rgba(255,255,255,0.25);
    box-shadow: 0 0 0 4px rgba(255,255,255,0.10);
  }
  .stageTeam .bigLamp.running{
    background: var(--yellow);
    box-shadow: 0 0 0 4px rgba(244,206,9,0.20), 0 0 22px rgba(244,206,9,0.45);
  }
  .stageTeam .bigLamp.done{
    background: #fff;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.20), 0 0 22px rgba(255,255,255,0.30);
  }

  .closeBtn{
    border: 1px solid rgba(244,206,9,0.30);
    background: rgba(0,0,0,0.22);
    color: var(--ink);
    border-radius: 999px;
    padding: 10px 12px;
    font-weight: 950;
    cursor:pointer;
  }

  .stageBody{
    padding: 10px 18px 18px;
    position:relative;
    z-index:1;
    display:grid;
    grid-template-columns: 1.2fr 0.8fr;
    gap: 18px;
    align-items:center;
  }
  @media (max-width: 860px){
    .stageBody{ grid-template-columns: 1fr; }
  }

  .bigCircle{
    width: min(420px, 85vw);
    aspect-ratio: 1 / 1;
    margin: 6px auto;
    position:relative;
  }
  .bigCircle svg{ transform: rotate(-90deg); }

  .bigCircle::before{
    content:"";
    position:absolute;
    inset:-14px;
    border-radius: 999px;
    background:
      repeating-conic-gradient(
        from 0deg,
        rgba(244,206,9,0.70) 0 5deg,
        rgba(155,0,0,0.50) 5deg 7deg,
        rgba(255,255,255,0.10) 7deg 13deg
      );
    opacity: 0.40;
    mask: radial-gradient(circle, transparent 58%, #000 59%);
    -webkit-mask: radial-gradient(circle, transparent 58%, #000 59%);
    animation: lightsSpin 6s linear infinite;
  }
  @keyframes lightsSpin{ to{ transform: rotate(360deg); } }

  .bigCircle::after{
    content:"";
    position:absolute;
    inset:-26px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(244,206,9,0.22), transparent 62%);
    opacity: 0.85;
    filter: blur(10px);
    pointer-events:none;
  }

  .bigTime{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-variant-numeric: tabular-nums;
    font-weight: 1100;
    font-size: clamp(52px, 7vw, 90px);
    color: var(--yellow);
    text-shadow: 0 3px 0 rgba(0,0,0,0.25), 0 0 30px rgba(244,206,9,0.18);
    letter-spacing: 1.5px;
  }
  .bigTime.done{ color: rgba(255,255,255,0.95); }

  .stageControls{
    display:flex;
    flex-direction:column;
    gap: 10px;
  }
  .stageControls .row{
    display:flex;
    gap: 10px;
  }
  .stageControls .row button{ flex:1; }

  .note{
    margin-top: 8px;
    color: rgba(255,255,255,0.80);
    font-size: 13px;
    line-height: 1.3;
  }

  /* ====== last seconds drama ====== */
  .panic .ring{ stroke: rgba(255,255,255,0.95); filter: drop-shadow(0 0 16px rgba(255,255,255,0.25)); }
  .panic .time{ color: rgba(255,255,255,0.95); }

  .pulse .circle::before{ opacity: 0.55; }
  .pulse .ring{ animation: ringPulse .9s ease-in-out infinite; }
  @keyframes ringPulse{
    0%,100%{ filter: var(--ringGlow); }
    50%{ filter: drop-shadow(0 0 18px rgba(244,206,9,0.35)) drop-shadow(0 0 36px rgba(244,206,9,0.22)); }
  }

  .blink{
    animation: blinkRed .45s ease-in-out infinite;
  }
  @keyframes blinkRed{
    0%,100%{ filter: none; }
    50%{ filter: drop-shadow(0 0 0 rgba(0,0,0,0)); }
  }

  /* ====== MOBILE OPTIMIZATIONS ====== */
  @media (max-width: 560px){

    /* Avoid flex-centering quirks on mobile: ensure content starts at top and can scroll */
    html, body{
      height: auto;
      min-height: 100vh;
    }
    body{
      display: block;
      justify-content: initial;
      align-items: initial;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-top: max(12px, env(safe-area-inset-top));
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }
    .app{
      width: 100%;
    }
    body{
      padding: 12px;
      background-attachment: scroll;
    }

    .topbar{
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
      margin-bottom: 12px;
    }

    .brand{
      justify-content: center;
    }

    .logo{
      width: 48px;
      height: 48px;
      border-radius: 14px;
    }

    .titlewrap{
      text-align: center;
    }

    .title{
      font-size: 16px;
      letter-spacing: 0.7px;
    }

    .subtitle{
      font-size: 12px;
      line-height: 1.25;
    }

    .actions{
      width: 100%;
      gap: 10px;
    }

    .actions .pill{
      flex: 1;
      justify-content: center;
      padding: 12px 12px;
      font-size: 13px;
    }

    .grid{
      grid-template-columns: 1fr !important;
      gap: 12px;
    }

    .inner{
      padding: 16px 14px 14px;
    }

    .team{
      font-size: 13px;
      margin-bottom: 10px;
    }

    .circle{
      width: 190px;
      height: 190px;
      margin-bottom: 12px;
    }

    .time{
      font-size: 46px;
    }

    .controls button{
      padding: 14px 14px;
      border-radius: 16px;
      font-size: 14px;
    }

    .adders{
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .adder{
      padding: 12px 0;
      border-radius: 14px;
      font-size: 12px;
    }

    .reset{
      padding: 14px 14px;
      border-radius: 16px;
      font-size: 14px;
    }

    .footer{
      font-size: 12px;
    }

    /* Overlay on mobile */
    .overlay{
      padding: 14px;
    }

    .stage{
      border-radius: 22px;
    }

    .stageHeader{
      padding: 14px 14px 10px;
    }

    .closeBtn{
      padding: 12px 12px;
    }

    .bigCircle{
      width: min(420px, 92vw);
    }

    .bigTime{
      font-size: clamp(56px, 13vw, 86px);
    }

    .stageControls .row button{
      padding: 14px 14px;
      border-radius: 16px;
      font-size: 14px;
    }

    .stageControls .adder{
      padding: 12px 0;
      border-radius: 14px;
      font-size: 12px;
    }

    .stageControls .reset{
      padding: 14px 14px;
      border-radius: 16px;
      font-size: 14px;
    }
  }

</style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo" title="Slimste Mens">
          <!-- Zet jouw eerder ring-logo naast de HTML als slimste.png -->
          <img src="slimste.png" alt="Slimste Mens thema" />
        </div>
        <div class="titlewrap">
          <h1 class="title">De Slimste Timer</h1>
          <p class="subtitle">Klik op een team voor Quizmodus • <span class="kbd">Spatie</span> play/pauze • <span class="kbd">R</span> reset • <span class="kbd">ESC</span> sluit</p>
        </div>
      </div>

      <div class="actions">
        <button class="pill pillSmall" id="finaleBtn">🏁 Finale</button>
        <button class="pill" id="fsBtn">⛶ Fullscreen</button>
      </div>
    </div>

    <section class="grid" id="grid"></section>
    <div id="jsNotice" style="display:none;margin-top:14px;padding:14px 16px;border-radius:18px;
      border:1px solid rgba(244,206,9,0.35);background:rgba(0,0,0,0.22);color:rgba(255,255,255,0.92);
      font-weight:850;line-height:1.25;">
      Timers laden niet. Open dit bestand in <b>Safari</b> (niet in de iOS preview/Bestanden-weergave).
      Gebruik <b>Delen</b> → <b>Open in Safari</b>.
    </div>

    <noscript>
      <div style="margin-top:14px;padding:14px 16px;border-radius:18px;
        border:1px solid rgba(244,206,9,0.35);background:rgba(0,0,0,0.22);color:rgba(255,255,255,0.92);
        font-weight:850;line-height:1.25;">
        JavaScript staat uit of wordt geblokkeerd. Open dit bestand in <b>Safari</b>.
      </div>
    </noscript>

  </div>

  <!-- Quizmodus overlay -->
  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="stage" role="dialog" aria-modal="true" aria-label="Quizmodus">
      <div class="stageHeader">
        <div class="stageTeam">
          <span class="bigLamp" id="stageLamp" aria-hidden="true"></span>
          <span id="stageTeamName">Team</span>
        </div>
        <button class="closeBtn" id="closeBtn">✕</button>
      </div>

      <div class="stageBody">
        <div class="bigCircle" id="bigCircle">
          <svg viewBox="0 0 160 160" aria-hidden="true">
            <circle class="ring-bg" cx="80" cy="80" r="60"></circle>
            <circle class="ring" id="stageRing" cx="80" cy="80" r="60"></circle>
          </svg>
          <div class="bigTime" id="stageTime">00:00</div>
        </div>

        <div class="stageControls">
          <div class="row">
            <button class="play" id="stagePlay">Play</button>
            <button class="pause" id="stagePause">Pauze</button>
          </div>
          <div class="adders">

    btn.addEventListener("click", () => {
      if (!activeTimer) return;
      activeTimer.add(Number(btn.dataset.sec));
      activeTimer.render();
      renderStage();
    });
  });

  function renderStage(){
    if (!activeTimer) return;

    // text
    stageTime.textContent = fmt(activeTimer.remaining);
    stageTime.classList.toggle("done", activeTimer.done);

    // lamp
    stageLamp.classList.toggle("running", activeTimer.running);
    stageLamp.classList.toggle("done", activeTimer.done);

    // ring
    const ratio = (activeTimer._max <= 0) ? 0 : (activeTimer.remaining / activeTimer._max);
    const clamped = Math.max(0, Math.min(1, ratio));
    const offset = stageC * (1 - clamped);
    stageRing.style.strokeDashoffset = String(offset);

    // drama on big view
    bigCircle.classList.toggle("panic", activeTimer.remaining > 0 && activeTimer.remaining <= 5 && !activeTimer.done);
    bigCircle.classList.toggle("pulse", activeTimer.remaining > 0 && activeTimer.remaining <= 10 && !activeTimer.done);
  }

  // ---- UI refresh loop ----
  (function raf(){
    timers.forEach(t => t.render());
    if (activeTimer) renderStage();
    requestAnimationFrame(raf);
  })();

  // ---- If timers didn't mount (common in iOS preview/Quick Look), show a notice ----
  window.addEventListener("load", () => {
    setTimeout(() => {
      const g = document.getElementById("grid");
      const notice = document.getElementById("jsNotice");
      if (g && notice && g.children.length === 0){
        notice.style.display = "block";
      }
    }, 250);
  });


  // ---- Fullscreen ----
  const fsBtn = document.getElementById("fsBtn");
  fsBtn.addEventListener("click", async () => {
    if (!document.fullscreenElement) {
      await document.documentElement.requestFullscreen?.();
    } else {
      await document.exitFullscreen?.();
    }
  });

  // ---- PWA: service worker (requires https or localhost) ----
  (function(){
    if ('serviceWorker' in navigator){
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  })();

</script>
</body>
</html>
